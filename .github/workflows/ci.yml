name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm run audit

      - name: Audit changed code with Fallow
        run: pnpm fallow:ci

      - name: Upload Fallow SARIF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fallow-sarif-${{ github.run_id }}
          path: .fallowci/fallow.sarif
          if-no-files-found: error
          retention-days: 14

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end test
        run: pnpm test:e2e:ci

      - name: Lighthouse audit
        run: pnpm test:lighthouse:ci

      - name: Build production container
        run: pnpm container:build

      - name: Smoke-test production container
        run: pnpm container:smoke
